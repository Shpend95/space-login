<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORBITAL COMMAND — Profile</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#020b18; font-family:'Courier New',monospace; color:#c0e8ff; min-height:100vh; }

    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 40px;
      background:rgba(0,20,45,0.9);
      border-bottom:1px solid rgba(0,200,255,0.12);
      position:sticky; top:0; z-index:50;
    }
    .nav-brand { display:flex; align-items:center; gap:10px; font-size:16px; letter-spacing:4px; color:#00c8ff; }
    .nav-links { display:flex; gap:8px; }
    .nav-links a {
      padding:8px 18px; border-radius:6px; font-size:11px; letter-spacing:3px;
      color:rgba(0,200,255,0.6); text-decoration:none;
      border:1px solid transparent; transition:all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color:#00c8ff; border-color:rgba(0,200,255,0.3); background:rgba(0,200,255,0.07); }
    .nav-right { display:flex; align-items:center; gap:16px; font-size:11px; letter-spacing:2px; color:rgba(0,200,255,0.4); }
    .logout-btn {
      padding:7px 16px; border-radius:6px; font-size:11px; letter-spacing:2px;
      color:#ff4d6d; border:1px solid rgba(255,77,109,0.3); background:none;
      cursor:pointer; font-family:'Courier New',monospace; transition:all 0.2s;
    }
    .logout-btn:hover { background:rgba(255,77,109,0.1); }

    main { max-width:700px; margin:0 auto; padding:50px 24px; }

    .page-header { margin-bottom:40px; }
    .page-header h2 { font-size:22px; letter-spacing:5px; color:#00c8ff; text-transform:uppercase; }
    .page-header p  { margin-top:8px; font-size:11px; letter-spacing:2px; color:rgba(0,200,255,0.4); }

    .card {
      background:rgba(0,20,45,0.8);
      border:1px solid rgba(0,200,255,0.15);
      border-radius:16px; padding:40px;
      position:relative;
    }
    .card::before {
      content:''; position:absolute; top:-1px; left:20%; right:20%;
      height:2px;
      background:linear-gradient(90deg, transparent, #00c8ff, transparent);
    }

    .avatar-row {
      display:flex; align-items:center; gap:24px; margin-bottom:36px;
      padding-bottom:28px; border-bottom:1px solid rgba(0,200,255,0.1);
    }
    .avatar {
      width:80px; height:80px; border-radius:50%;
      background:linear-gradient(135deg, #005a8e, #007abf);
      border:2px solid rgba(0,200,255,0.3);
      display:flex; align-items:center; justify-content:center; font-size:36px;
    }
    .avatar-info h3 { font-size:16px; letter-spacing:3px; color:#00c8ff; }
    .avatar-info p  { font-size:11px; letter-spacing:2px; color:rgba(0,200,255,0.4); margin-top:4px; }

    .section-title {
      font-size:10px; letter-spacing:4px; color:rgba(0,200,255,0.4);
      margin-bottom:20px; margin-top:32px; text-transform:uppercase;
    }

    .field { margin-bottom:20px; }
    label {
      display:block; font-size:10px; letter-spacing:3px;
      color:rgba(0,200,255,0.5); margin-bottom:8px; text-transform:uppercase;
    }
    input, select {
      width:100%;
      background:rgba(0,30,60,0.6);
      border:1px solid rgba(0,200,255,0.15);
      border-radius:8px; padding:12px 16px;
      color:#e0f4ff; font-family:'Courier New',monospace;
      font-size:14px; outline:none; transition:border-color 0.3s, box-shadow 0.3s;
    }
    input:focus, select:focus {
      border-color:rgba(0,200,255,0.5);
      box-shadow:0 0 12px rgba(0,200,255,0.1);
    }
    select option { background:#021428; }

    .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

    .btn-row { display:flex; gap:12px; margin-top:32px; }
    .btn {
      flex:1; padding:13px; border-radius:8px;
      font-family:'Courier New',monospace; font-size:12px; letter-spacing:3px;
      cursor:pointer; transition:all 0.3s; text-transform:uppercase;
    }
    .btn-primary {
      background:linear-gradient(135deg,#005a8e,#007abf);
      border:1px solid rgba(0,200,255,0.3); color:#e0f4ff;
    }
    .btn-primary:hover { background:linear-gradient(135deg,#007abf,#00a0e0); box-shadow:0 0 20px rgba(0,160,220,0.3); }
    .btn-secondary {
      background:transparent;
      border:1px solid rgba(0,200,255,0.2); color:rgba(0,200,255,0.6);
    }
    .btn-secondary:hover { border-color:rgba(0,200,255,0.4); color:#00c8ff; }

    .toast {
      position:fixed; bottom:30px; right:30px;
      background:rgba(0,255,150,0.1); border:1px solid rgba(0,255,150,0.3);
      border-radius:10px; padding:14px 24px;
      font-size:12px; letter-spacing:2px; color:#00ff96;
      transform:translateY(80px); opacity:0; transition:all 0.4s;
      z-index:999;
    }
    .toast.show { transform:translateY(0); opacity:1; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">🛸 ORBITAL COMMAND</div>
  <div class="nav-links">
    <a href="dashboard.html">DASHBOARD</a>
    <a href="profile.html" class="active">PROFILE</a>
    <a href="shop.html">TELESCOPE SHOP</a>
  </div>
  <div class="nav-right">
    <span id="navUser"></span>
    <button class="logout-btn" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h2>👨‍🚀 Commander Profile</h2>
    <p>UPDATE YOUR PERSONAL DETAILS AND MISSION PREFERENCES</p>
  </div>

  <div class="card">
    <div class="avatar-row">
      <div class="avatar">👨‍🚀</div>
      <div class="avatar-info">
        <h3 id="displayName">COMMANDER</h3>
        <p id="displayCallsign">CALLSIGN: —</p>
      </div>
    </div>

    <p class="section-title">Personal Information</p>
    <div class="row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="e.g. Shpend"/>
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="e.g. Llanaj"/>
      </div>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="commander@orbital.space"/>
    </div>
    <div class="field">
      <label>Callsign</label>
      <input type="text" id="callsign" placeholder="Your mission callsign"/>
    </div>

    <p class="section-title">Mission Preferences</p>
    <div class="row">
      <div class="field">
        <label>Home Station</label>
        <select id="station">
          <option value="">Select station</option>
          <option value="ISS">International Space Station</option>
          <option value="LUNA">Lunar Base Alpha</option>
          <option value="MARS">Mars Outpost Ares</option>
          <option value="DEEP">Deep Space Station 9</option>
        </select>
      </div>
      <div class="field">
        <label>Specialty</label>
        <select id="specialty">
          <option value="">Select specialty</option>
          <option value="astro">Astrophysics</option>
          <option value="nav">Navigation</option>
          <option value="eng">Engineering</option>
          <option value="bio">Astrobiology</option>
          <option value="ops">Operations</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="resetForm()">RESET</button>
      <button class="btn btn-primary" onclick="saveProfile()">SAVE CHANGES</button>
    </div>
  </div>
</main>

<div class="toast" id="toast">✓ PROFILE UPDATED SUCCESSFULLY</div>

<script>
  const commander = localStorage.getItem('commander');
  if (!commander) window.location.href = 'index.html';
  document.getElementById('navUser').textContent = commander.toUpperCase();

  // Load saved profile
  const saved = JSON.parse(localStorage.getItem('profile_' + commander) || '{}');
  const fields = ['firstName','lastName','email','callsign','station','specialty'];
  fields.forEach(f => { if (saved[f]) document.getElementById(f).value = saved[f]; });
  updateDisplay();

  function updateDisplay() {
    const fn = document.getElementById('firstName').value;
    const ln = document.getElementById('lastName').value;
    const cs = document.getElementById('callsign').value;
    document.getElementById('displayName').textContent =
      (fn || ln) ? (fn + ' ' + ln).trim().toUpperCase() : commander.toUpperCase();
    document.getElementById('displayCallsign').textContent =
      'CALLSIGN: ' + (cs || '—').toUpperCase();
  }

  document.querySelectorAll('input').forEach(i => i.addEventListener('input', updateDisplay));

  function saveProfile() {
    const data = {};
    fields.forEach(f => data[f] = document.getElementById(f).value);
    localStorage.setItem('profile_' + commander, JSON.stringify(data));
    updateDisplay();
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function resetForm() {
    fields.forEach(f => document.getElementById(f).value = '');
    updateDisplay();
  }

  function logout() {
    localStorage.removeItem('commander');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
