<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORBITAL COMMAND — Secure Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020b18;
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Starfield ── */
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── Earth glow in background ── */
    .earth {
      position: fixed;
      bottom: -320px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        #1a6b9a 0%, #0d3d6b 40%, #061e3a 70%, #020b18 100%);
      box-shadow: 0 0 80px 20px rgba(30, 100, 180, 0.25);
      z-index: 0;
    }

    /* ── Login card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      background: rgba(5, 20, 40, 0.85);
      border: 1px solid rgba(0, 200, 255, 0.2);
      border-radius: 16px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 40px rgba(0, 180, 255, 0.08),
        inset 0 0 30px rgba(0, 100, 200, 0.05);
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00c8ff, transparent);
      border-radius: 2px;
    }

    /* ── Header ── */
    .badge {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .badge-icon {
      font-size: 36px;
      filter: drop-shadow(0 0 8px rgba(0, 200, 255, 0.6));
    }

    .badge-text h1 {
      font-size: 18px;
      letter-spacing: 4px;
      color: #00c8ff;
      text-transform: uppercase;
    }

    .badge-text p {
      font-size: 11px;
      color: rgba(0, 200, 255, 0.45);
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(0, 200, 255, 0.1);
      margin-bottom: 28px;
    }

    /* ── Status indicator ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(0, 255, 150, 0.7);
      letter-spacing: 2px;
      margin-bottom: 28px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #00ff96;
      box-shadow: 0 0 6px #00ff96;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0, 200, 255, 0.5);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: rgba(0, 30, 60, 0.6);
      border: 1px solid rgba(0, 200, 255, 0.15);
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0f4ff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus {
      border-color: rgba(0, 200, 255, 0.5);
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.1);
    }

    input::placeholder { color: rgba(100, 170, 200, 0.3); }

    /* ── Button ── */
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: linear-gradient(135deg, #005a8e, #007abf);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 8px;
      color: #e0f4ff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: linear-gradient(135deg, #007abf, #00a0e0);
      box-shadow: 0 0 20px rgba(0, 160, 220, 0.35);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn.loading {
      pointer-events: none;
      letter-spacing: 2px;
    }

    /* ── Message ── */
    .message {
      margin-top: 18px;
      font-size: 12px;
      letter-spacing: 2px;
      text-align: center;
      min-height: 18px;
      transition: all 0.3s;
    }

    .message.error  { color: #ff4d6d; }
    .message.success { color: #00ff96; }

    /* ── Success overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 10, 25, 0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .overlay h2 {
      font-size: 28px;
      letter-spacing: 8px;
      color: #00ff96;
      text-shadow: 0 0 20px rgba(0, 255, 150, 0.6);
      margin-top: 24px;
      animation: flicker 0.1s 3;
    }

    .overlay p {
      margin-top: 12px;
      font-size: 13px;
      letter-spacing: 3px;
      color: rgba(0, 200, 255, 0.6);
    }

    .rocket {
      font-size: 64px;
      animation: launch 1.5s ease-in forwards;
    }

    @keyframes launch {
      0%   { transform: translateY(0) rotate(-45deg); opacity: 1; }
      100% { transform: translateY(-200px) rotate(-45deg); opacity: 0; }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 200, 255, 0.2);
      text-align: center;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="earth"></div>

<div class="card">
  <div class="badge">
    <span class="badge-icon">🛸</span>
    <div class="badge-text">
      <h1>Orbital Command</h1>
      <p>Secure Mission Access Portal</p>
    </div>
  </div>
  <hr class="divider"/>

  <div class="status-bar">
    <div class="dot"></div>
    SYSTEMS ONLINE — AWAITING AUTHENTICATION
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Commander ID</label>
      <input type="text" id="username" placeholder="Enter your callsign" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Access Code</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <button class="btn" type="submit" id="loginBtn">INITIATE ACCESS</button>
    <div class="message" id="message"></div>
  </form>

  <div class="footer">ORBITAL COMMAND STATION — CLEARANCE LEVEL ALPHA</div>
</div>

<!-- Success overlay -->
<div class="overlay" id="overlay">
  <div class="rocket">🚀</div>
  <h2>ACCESS GRANTED</h2>
  <p>WELCOME ABOARD, COMMANDER</p>
</div>

<script>
  /* ── Starfield ── */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars(count = 200) {
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2,
        alpha: Math.random(),
        speed: Math.random() * 0.4 + 0.1,
        twinkle: Math.random() * 0.02 + 0.005
      });
    }
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.alpha += s.twinkle * (Math.random() > 0.5 ? 1 : -1);
      s.alpha = Math.max(0.1, Math.min(1, s.alpha));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 230, 255, ${s.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize(); initStars(); drawStars();

  /* ── Login logic ── */
  // Demo credentials
  const USERS = {
    'commander': 'orbit2026',
    'admin':     'launch123',
    'shpend':    'aetrex2026'
  };

  function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const msg      = document.getElementById('message');

    if (!username || !password) {
      showMessage('COMMANDER ID AND ACCESS CODE REQUIRED', 'error');
      return;
    }

    // Loading state
    btn.textContent = 'AUTHENTICATING...';
    btn.classList.add('loading');
    msg.className = 'message';
    msg.textContent = '';

    setTimeout(() => {
      if (USERS[username] && USERS[username] === password) {
        showMessage('IDENTITY VERIFIED — LAUNCHING...', 'success');
        setTimeout(() => {
          document.getElementById('overlay').classList.add('show');
        }, 800);
      } else {
        btn.textContent = 'INITIATE ACCESS';
        btn.classList.remove('loading');
        showMessage('ACCESS DENIED — INVALID CREDENTIALS', 'error');
        shake(document.querySelector('.card'));
      }
    }, 1200);
  }

  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = `message ${type}`;
  }

  function shake(el) {
    el.style.animation = 'none';
    el.style.transition = 'transform 0.05s';
    let i = 0;
    const interval = setInterval(() => {
      el.style.transform = `translateX(${i % 2 === 0 ? -6 : 6}px)`;
      if (++i > 8) { clearInterval(interval); el.style.transform = ''; }
    }, 50);
  }
</script>
</body>
</html>
